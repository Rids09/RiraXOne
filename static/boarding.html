<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Boarding Pass - CONFIRMED</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="shortcut icon" href="https://i.pinimg.com/1200x/59/0f/e7/590fe784586d6b274d278d91df2a5d8e.jpg">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- Bootstrap -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Rubik', Arial, sans-serif;
            background: url(https://i.pinimg.com/1200x/26/fd/44/26fd44f430aa8b0464a58634543d82b0.jpg);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            padding-top: 120px;
            margin: 0;
        }
        
        .logo {
            font-size: 1.8rem;
            color: #fff;
            font-weight: 700;
            text-decoration: none;
        }

        .logo i {
            color: #00c3ff;
            margin-right: 8px;
        }

        .nav {
            display: flex;
            gap: 20px;
        }

        .nav a {
            color: #fff;
            text-decoration: none;
            font-size: 1rem;
            transition: 0.3s;
        }

        .nav a:hover {
            color: #00c3ff;
        }

        /* ===== TICKET ===== */
        .ticket-card {
            max-width: 600px;
            margin: 40px auto;
            background: #ffffffd9;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
            border: 2px solid #013170;
        }

        .ticket-card::before {
            content: '';
            display: block;
            height: 10px;
            background-color: #013170;
            border-radius: 10px 10px 0 0;
            margin: -30px -30px 20px -30px;
        }

        .header-title {
            text-align: center;
            margin-bottom: 20px;
        }

        .header-title h1 {
            color: #013170;
            font-weight: 900;
        }

        .segment {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            background: #f9f9f9;
        }

        .label {
            font-size: 12px;
            color: #666;
            display: block;
        }

        .value {
            font-size: 16px;
            font-weight: 700;
        }

        .route-path {
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-align: center;
        }

        .code {
            font-size: 28px;
            font-weight: bold;
            color: #003478;
        }

        .barcode {
            text-align: center;
            margin-top: 20px;
        }

        .barcode img {
            width: 200px;
        }
    </style>
</head>

<body>
    <!-- TICKET -->
    <div class="ticket-card" id="ticket-card" style="display:none;">

        <div class="header-title">
            <h1 id="airline-name">RiraXOne</h1>
            <p class="text-success">BOOKING CONFIRMED!!</p>
        </div>

        <div id="loading">Loading confirmed ticket details...</div>

        <div id="content" style="display:none;">

            <div class="segment">
                <div class="row">
                    <div class="col-6">
                        <span class="label">PNR</span>
                        <span class="value" id="pnr-display"></span>
                    </div>
                    <div class="col-6 text-end">
                        <span class="label">FLIGHT/CLASS</span>
                        <span class="value" id="flight-class-display"></span>
                    </div>
                </div>
            </div>

            <div class="segment">
                <div class="route-path">
                    <div>
                        <div class="code" id="from-code-display"></div>
                        <span class="label" id="from-city-display"></span>
                    </div>

                    <div>✈️</div>

                    <div>
                        <div class="code" id="to-code-display"></div>
                        <span class="label" id="to-city-display"></span>
                    </div>
                </div>
            </div>

            <div class="segment">
                <div class="row">
                    <div class="col-4">
                        <span class="label">DATE</span>
                        <span class="value" id="date-display"></span>
                    </div>
                    <div class="col-4">
                        <span class="label">TIME</span>
                        <span class="value" id="time-display"></span>
                    </div>
                    <div class="col-4">
                        <span class="label">PASSENGERS</span>
                        <span class="value" id="passengers-display"></span>
                    </div>
                </div>
            </div>

            <div class="barcode">
                <img id="barcode-img" src="">
                <p class="label">Present this code at check-in</p>
            </div>

        </div>
    </div>

    <script>
        const apiBase = window.location.origin.startsWith('http')
            ? window.location.origin
            : 'http://127.0.0.1:5000';

        function getQueryParam(name) {
            return new URLSearchParams(window.location.search).get(name);
        }

        async function loadBoardingPass() {
            const bookingId = getQueryParam('booking_id');

            const loading = document.getElementById('loading');
            const content = document.getElementById('content');
            const ticketCard = document.getElementById('ticket-card');

            ticketCard.style.display = 'block';

            if (!bookingId) {
                loading.innerText = 'Missing booking ID.';
                return;
            }

            try {
                const res = await fetch(`${apiBase}/booking/${bookingId}`);
                const data = await res.json();

                loading.style.display = 'none';

                if (!res.ok) {
                    content.innerHTML = `<div class="alert alert-danger">${data.error}</div>`;
                    content.style.display = 'block';
                    return;
                }

                document.getElementById('pnr-display').innerText = data.pnr;
                document.getElementById('flight-class-display').innerText = `${data.flight_id}/${data.class}`;
                document.getElementById('from-code-display').innerText = data.from_code;
                document.getElementById('from-city-display').innerText = data.from_city;
                document.getElementById('to-code-display').innerText = data.to_code;
                document.getElementById('to-city-display').innerText = data.to_city;
                document.getElementById('date-display').innerText = data.travel_date;
                document.getElementById('time-display').innerText = data.departure_time;
                document.getElementById('passengers-display').innerText = data.passengers;

                document.getElementById('barcode-img').src =
                    `https://barcode.tec-it.com/barcode.ashx?data=${data.pnr}&code=Code128`;

                content.style.display = 'block';

            } catch (err) {
                loading.innerText = 'Server not running or network error.';
            }
        }

        document.addEventListener('DOMContentLoaded', loadBoardingPass);
    </script>

</body>

</html>
